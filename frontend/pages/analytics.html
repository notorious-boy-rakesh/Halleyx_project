<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Driver Analytics - Notorious Transport</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">Driver Performance Intelligence</div>
    </header>

    <div class="page-content">
      <div class="card-glass" style="padding:0; overflow:hidden;">
        <div style="padding:16px 24px; border-bottom:1px solid var(--glass-border); background:#f8fafc; display:flex; justify-content:space-between; align-items:center;">
          <h3 style="font-size:1.1rem; margin:0;">Fleet Driver Rankings</h3>
          <span style="font-size:0.8rem; color:var(--text-muted);"><i class="fa fa-info-circle"></i> Scores computed automatically via Fraud & Profit engines.</span>
        </div>
        
        <table class="table-glass" id="driversTable">
          <thead>
            <tr>
              <th>Driver Info</th>
              <th>Trips Completed</th>
              <th>Anomalies Triggered</th>
              <th>Performance Standard</th>
              <th>Safety / Profit Score <span style="font-size:0.7rem; color:var(--text-dim)">(0-10)</span></th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="5" class="empty-state">Loading intelligence...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const user = requireAuth();
    renderSidebar('analytics');
    
    if(user.role === 'driver') window.location.href = 'dashboard.html'; // Drivers shouldn't see all driver scores usually, but for demo they could. Let's restrict it.

    function getLabelBadge(label) {
      if(label === 'Exceptional') return `<span class="badge-pill badge-success"><i class="fa fa-star"></i> Exceptional</span>`;
      if(label === 'Efficient') return `<span class="badge-pill badge-info">Efficient</span>`;
      if(label === 'Risky') return `<span class="badge-pill badge-warning">Risky</span>`;
      if(label === 'Probation') return `<span class="badge-pill badge-danger"><i class="fa fa-ban"></i> Probation</span>`;
      return `<span class="badge-pill badge-purple">Average</span>`;
    }

    async function loadAnalytics() {
      try {
        const res = await API.get('/analytics/drivers');
        const tb = document.querySelector('#driversTable tbody');
        
        tb.innerHTML = res.data.map(d => {
          const scoreColor = d.driverScore >= 8 ? 'var(--success)' : (d.driverScore >= 5 ? 'var(--info)' : 'var(--danger)');
          return `
            <tr>
              <td>
                <div style="font-weight:600;">${d.name}</div>
                <div style="font-size:0.8rem; color:var(--text-muted);">${d.email}</div>
              </td>
              <td style="font-weight:600;">${d.totalTripsCompleted}</td>
              <td style="color:${d.totalAnomaliesTriggered > 0 ? 'var(--danger)' : 'var(--text-muted)'}; font-weight:600;">
                ${d.totalAnomaliesTriggered}
              </td>
              <td>${getLabelBadge(d.driverLabel)}</td>
              <td>
                <div style="display:flex; align-items:center; gap:12px;">
                  <span style="font-weight:700; font-size:1.2rem; color:${scoreColor}">${d.driverScore.toFixed(1)}</span>
                  <div style="flex:1; max-width:150px; height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden;">
                    <div style="height:100%; background:${scoreColor}; width:${Math.min(100, Math.max(0, d.driverScore * 10))}%;"></div>
                  </div>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      } catch (err) { Toast.show(err.message, 'danger'); }
    }

    loadAnalytics();
  </script>
</body>
</html>
